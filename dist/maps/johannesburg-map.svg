<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 640" width="375" height="640" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dfe8f0"/>
      <stop offset="50%" stop-color="#e8eef4"/>
      <stop offset="100%" stop-color="#dce5ee"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="375" height="640" fill="url(#bg)"/>
  <!-- Parks / open -->
  <ellipse cx="280" cy="120" rx="55" ry="38" fill="#c8dcc8" opacity="0.65"/>
  <ellipse cx="90" cy="420" rx="48" ry="72" fill="#c5d9c5" opacity="0.5"/>
  <ellipse cx="300" cy="480" rx="40" ry="55" fill="#bcd4bc" opacity="0.45"/>
  <!-- Major roads -->
  <path d="M-20 280 L395 265" stroke="#b8c5d4" stroke-width="14" stroke-linecap="round" fill="none"/>
  <path d="M180 -20 L195 660" stroke="#aab9ca" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M-10 120 Q 120 200 200 320 T 385 520" stroke="#c5d0dc" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M40 600 Q 150 480 220 360 T 360 80" stroke="#b0bec9" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M0 480 L375 450" stroke="#bdc8d6" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M320 0 L280 640" stroke="#a8b8c8" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- Secondary grid -->
  <g stroke="#cfd8e3" stroke-width="4" stroke-linecap="round" opacity="0.85">
    <path d="M20 80 H355"/><path d="M20 200 H355"/><path d="M20 360 H355"/><path d="M20 520 H355"/>
    <path d="M60 20 V620"/><path d="M140 20 V620"/><path d="M240 20 V620"/><path d="M320 20 V620"/>
  </g>
  <!-- CBD block hint -->
  <rect x="155" y="295" width="65" height="48" rx="4" fill="#a8b5c4" opacity="0.35"/>
  <!-- Water / mine dump hint -->
  <path d="M30 540 Q 80 500 130 530 T 200 520" stroke="#9eb8d0" stroke-width="6" fill="#b8d0e8" opacity="0.4" stroke-linecap="round"/>
  <text x="187" y="28" text-anchor="middle" fill="#475569" font-family="system-ui, Segoe UI, sans-serif" font-size="11" font-weight="600">Johannesburg · Gauteng</text>
  <text x="187" y="44" text-anchor="middle" fill="#64748b" font-family="system-ui, Segoe UI, sans-serif" font-size="9">Reference map (static · Figma-safe)</text>
</svg>
